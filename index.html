        <div class="body"><p class="" style="white-space:pre-wrap;">When the rocket lifts off, her body falls.</p><p class="" style="white-space:pre-wrap;">In this film, we postulate a future history of rocket debris abandonment and recovery, through a “hunt” for abandoned rocket debris in remote areas. The protagonist sets off across valleys and villages, and into the desert in the southwest of China, in a search for the debris of rockets fallen since the 1990s. She may find one, or she may never. She wonders what it would be like to be the first person to see this stone, to hear the rumblings from the sky, to shake by shivering land. Or perhaps it would come quietly, waking no one but alarmed animals. Either way it falls, as if back into a sleep. </p><p class="" style="white-space:pre-wrap;">In this story, the white stone is the fallen body of a rocket. Shifting our gaze from the sky back to the ground, we reexamine the life span of technologies, marking the terrestrial death of an extraterrestrial object.  </p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p></div>

    <div class="project-item clearfix visually-hidden" data-dynamic-href="/ground-station/" data-type-name="page">
      <div class="meta">
        <h1 data-shrink-original-size="23">Ground Station</h1>
        

        <div class="body"><p class="" style="white-space:pre-wrap;">The pandemic has overturned daily life and registered new spatial and temporal positions in our confined domestic spaces. Adrift, suddenly without bearings, Liu locates herself in images received by radio from passing NOAA weather satellites. The images are continuously broadcasted to Earth via the Automatic Picture Transmission (APT) system. When the satellites pass overhead, their transmissions can be received on the ground. Translated from radio into sound as the signals are received, each line of the image can be heard as a ping, its consistent, musical tempo a distinctive feature of the FM broadcast. Liu and her partner Gershon Dublon have practiced receiving the images in their Brooklyn backyard since April 2020, sweeping an antenna fashioned from a broomstick and coat hanger wire across the sky. The noise and glitches in the images were caused by them sometimes missing the direction of a satellite, or a nearby building getting in the way of the horizon. Each image received was uniquely captured over the ten to fifteen minutes when one of the satellites was in a direct line-of-sight to the artist. </p></div>

      <div class="meta">
        <h1 data-shrink-original-size="23">Drift Upwards, Fall Downwards</h1>
        

        <div class="body"><p class="" style="white-space:pre-wrap;">A collaboration with Nini Dongnier</p><p class="" style="white-space:pre-wrap;">移步上升，下降为人 </p><p class="" style="white-space:pre-wrap;">创作这支舞的过程里，渐渐演化出这样一个线索，也是作品的内在结构： </p><p class="" style="white-space:pre-wrap;"> I. 地、筑建、低空、天和地颠倒——在分不清是植物、矿物、动物还是人的时候，一团混合的生命体从泥土中摆脱重力，在土地之上筑建结构，十分缓慢和绵长的过程；试着将天和地颠倒过来，最终还是回到一步步的生长。 </p><p class="" style="white-space:pre-wrap;">II. 生成规则和秩序、抽象秩序的具体化：由折叠、环绕、牵引、直角、圆形，到分离、奔跑、个体与个体的关联，在无序中始终有显要的规则… … </p><p class="" style="white-space:pre-wrap;">III. 一整个不可分割的动作——一幅绵延的环形壁画、每一步都是上升、都是仪式。 </p><p class="" style="white-space:pre-wrap;"> IV. 身体的重力的感受的具体化；安静的重置、确认自身在自然中、空间中、进化的时间坐标中的位置。 </p><p class="" style="white-space:pre-wrap;"> 这些不是阐释，是在和演员工作的过程中的实际对话。 </p><p class="" style="white-space:pre-wrap;">身体是最当下的材料，同时它携带着过往生物衍进的结果，每一步都无法跳过； </p><p class="" style="white-space:pre-wrap;">身体本身就是一种精妙和复合的媒材； </p><p class="" style="white-space:pre-wrap;">如上，我为身体知觉所拥有的古老的也是当下的记忆赋形。 </p><p class="" style="white-space:pre-wrap;">但是，说一千道一万，终究还是直接面对四个身体、一个场域、一段时间，处置体积、重量、身体细部、感官，这么一件基本的事。 </p><p class="" style="white-space:pre-wrap;">这是一个舞蹈，也是一个移动的雕塑，整个环境是雕塑，每一个物都在舞蹈。 </p><p class="" style="white-space:pre-wrap;"> </p><p class="" style="white-space:pre-wrap;">东妮尔 9/18/2021 </p><p class="" style="white-space:pre-wrap;"> </p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p></div>

        <div class="body"><p class="" style="white-space:pre-wrap;">2019</p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">Prints on accordion-bound rice paper</p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">A Book of Mine, of which the 900-page Volume X is one part, presents my entire genome in base pairs. Volume X contains the bases of my X chromosome. The DNA was sampled and sequenced in December 2018, and the reads were mapped to the Human X chromosome reference sequence UCSC hs38. The bases covered by my sequencing are annotated in black, and those uncovered in grey. </p></div>

        <h1 data-shrink-original-size="23">Sleepwalk</h1>
        

        <div class="body"><p class="" style="white-space:pre-wrap;">Sleepwalk is a solitary adventure game in which you find yourself confined to your apartment in New York City under quarantine. Information about the outside world comes to you through the news, and sometimes filters in through your window. As the days pass, you start to wonder whether this is all a dream.</p><p class="" style="white-space:pre-wrap;">Sleepwalk was built in 120 hours in Spring 2020, during which time the artist was living and working in her apartment under COVID-19 self-isolation orders by the State of New York. The game is the artist’s response to a prompt from the Onassis ENTER program.</p></div>

      <div class="meta">
        <h1 data-shrink-original-size="23">The Wandering Mind</h1>
        

        <div class="body"><p class="" style="white-space:pre-wrap;">A planetary-scale peripheral nervous system for dream states</p><p class="" style="white-space:pre-wrap;">Does the Earth dream? Can our dreams mesh? </p><p class="" style="white-space:pre-wrap;">In dreams we become free of the unrelenting coherence that waking life imposes, free to sink into the swamps of planetary perception. In the Wandering Mind, our planet meets us in our sleep, filtered through global networks of sound and artificial intelligence.</p><p class="" style="white-space:pre-wrap;">The project draws its source material from a global repository of more than 50,000 user-submitted field recordings called Radio Aporee, chopping and reassembling them into one continuous journey. For this premiere, we selected sounds from 2020 to listen, wander, and reflect in this global time of crisis.</p></div>

      <div class="meta">
        <h1 data-shrink-original-size="23">fa·ci·es</h1>
        

        <div class="body"><p class="" style="white-space:pre-wrap;">Aluminum, cooling unit, water from the air, wood (metal &amp; water) | Carbonized cedar wood, wood (wood &amp; fire) </p><p class="" style="white-space:pre-wrap;">Background: satellite map of Xinjiang.</p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">fa·ci·es</p><p class="" style="white-space:pre-wrap;">Dictionary result for facies /ˈfāSHēz,ˈfāSHēˌēz/</p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">noun</p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">1.</p><p class="" style="white-space:pre-wrap;">MEDICINE</p><p class="" style="white-space:pre-wrap;">the appearance or facial expression of an individual that is typical of a particular disease or condition.</p><p class="" style="white-space:pre-wrap;">"adenoidal facies are characterized by an open mouth gape"</p><p class="" style="white-space:pre-wrap;">2.</p><p class="" style="white-space:pre-wrap;">GEOLOGY</p><p class="" style="white-space:pre-wrap;">the character of a rock expressed by its formation, composition, and fossil content.</p><p class="" style="white-space:pre-wrap;">"a sedimentary investigation of the area led to the postulation of five distinct facies"</p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">(metal &amp; water)</p><p class="" style="white-space:pre-wrap;">The bronze casting mouth is cooled down to about minus 4~5 degrees Celsius which condensates water in the air on its surface and creates a layer of frost. </p><p class="" data-rte-preserve-empty="true" style="white-space:pre-wrap;"></p><p class="" style="white-space:pre-wrap;">(wood &amp; fire) </p><p class="" style="white-space:pre-wrap;">The cedar wood mouth is curved by hand and then burnt with fire torch. </p></div>
